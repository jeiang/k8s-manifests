{{- if .Values.admin.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-admin" (include "rbac-access.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- include "rbac-access.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.admin.clusterRole | quote }}
subjects:
{{- toYaml .Values.admin.subjects | nindent 2 }}
{{- end }}
