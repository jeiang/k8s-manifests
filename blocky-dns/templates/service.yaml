apiVersion: v1
kind: Service
metadata:
  name: {{ include "blocky-dns.fullname" . | quote }}
  labels:
    {{- include "blocky-dns.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if or (eq .Values.service.type "LoadBalancer") (eq .Values.service.type "NodePort") }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  {{- end }}
  selector:
    {{- include "blocky-dns.selectorLabels" . | nindent 4 }}
  ports:
    - name: dns-udp
      port: {{ .Values.service.dnsPort }}
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: {{ .Values.service.dnsPort }}
      targetPort: dns-tcp
      protocol: TCP
