replicaCount: 2

image:
  repository: ghcr.io/0xerr0r/blocky
  tag: v0.28.2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  annotations: {}
  externalTrafficPolicy: Cluster
  dnsPort: 53

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 350Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

nodeSelector: {}
tolerations: []
affinity: {}

blocky:
  config: |
    blocking:
      blockType: nxDomain
      clientGroupsBlock:
        default:
        - ads
      denylists:
        ads:
        - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
        - https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews/hosts
        - https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/gambling-only/hosts
        - https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@37522026.188.69901/hosts/pro.plus.txt
        - https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@37522026.188.69901/hosts/tif.txt
    customDNS:
      mapping: {}
    ports:
      dns: 53
      http: 8000
    upstreams:
      groups:
        default:
        - 1.1.1.1
        - 8.8.8.8
        - 8.8.4.4
        - tcp-tls:one.one.one.one:853
        - tcp-tls:dns.google:853
        - tcp-tls:dns.quad9.net:853
    log:
      level: info
      format: text

netbird:
  enabled: true
  bitwardenSecrets:
    netbirdApi:
      enabled: false
  networkRouter:
    enabled: false
    name: k8s
    namespace: netbird
  networkResources:
    enabled: true
    resources:
      - name: blocky-dns
        namespace: dns
        serviceRef:
          name: blocky-dns
        groups:
          - name: All
