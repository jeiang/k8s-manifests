{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "github-redirect.fullname" . }}-redirect
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "github-redirect.labels" . | nindent 4 }}
spec:
  redirectRegex:
    regex: {{ printf "^https?://%s/(.*)" (.Values.ingress.host | replace "." "\\.") | quote }}
    replacement: {{ printf "%s/${1}" .Values.redirect.target | quote }}
    permanent: true
{{- end }}
