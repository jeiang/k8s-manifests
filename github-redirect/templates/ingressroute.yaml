{{- if .Values.ingress.enabled }}
{{- if and .Values.ingress.tls.enabled .Values.ingress.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "github-redirect.fullname" . }}
  labels:
    {{- include "github-redirect.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName | quote }}
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.ingress.certManager.clusterIssuer | quote }}
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "github-redirect.fullname" . }}
  labels:
    {{- include "github-redirect.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      middlewares:
        - name: {{ include "github-redirect.fullname" . }}-redirect
      services:
        - kind: TraefikService
          name: noop@internal
{{- end }}
