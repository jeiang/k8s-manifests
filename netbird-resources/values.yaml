nameOverride: ""
fullnameOverride: ""

bitwardenSecrets:
  netbirdApi:
    enabled: true
    namespace: netbird
    organizationId: af918704-c223-4f10-a245-b4640144f2d9
    secretName: netbird-mgmt-api-key
    secretKeyName: NB_API_KEY
    secretId: 1824f6b7-989d-40c1-abe5-b46500292bf7
    authToken:
      secretName: bw-auth-token
      secretKey: token

networkRouter:
  enabled: true
  name: k8s
  namespace: netbird
  annotations: {}
  dnsZoneRef:
    name: k8s.jeiang.vpn
  extraSpec: {}

networkResources:
  enabled: true
  groups: []
  resources:
    - name: blocky-dns
      namespace: dns
      serviceRef:
        name: blocky-dns
      groups:
        - name: dns
    - name: lldap
      namespace: idp
      serviceRef:
        name: idp-lldap
      groups:
        - name: lldap
    - name: longhorn-frontend
      namespace: longhorn-system
      serviceRef:
        name: longhorn-frontend
      groups:
        - name: longhorn
    - name: longhorn-backend
      namespace: longhorn-system
      serviceRef:
        name: longhorn-backend
      groups:
        - name: longhorn
    - name: grafana
      namespace: monitoring
      serviceRef:
        name: monitoring-grafana
      groups:
        - name: monitoring
