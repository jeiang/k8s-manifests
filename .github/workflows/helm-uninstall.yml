name: Helm Uninstall

on:
  workflow_dispatch:
    inputs:
      chart:
        description: Deployable unit to uninstall
        type: choice
        required: true
        options:
          - actual-budget
          - bill-splitter
          - bitwarden-sm-operator
          - blocky-dns
          - crowdsec
          - github-redirect
          - hath
          - idp
          - monitoring
          - netbird
          - netbird-operator
          - netbird-resources
          - rbac-access
          - rclone-csi-driver
          - website
      confirm:
        description: Type the unit name exactly to confirm uninstall
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: helm-${{ inputs.chart }}
  cancel-in-progress: false

jobs:
  uninstall:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Confirm
        env:
          UNIT: ${{ inputs.chart }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "$UNIT" ]; then
            echo "::error::confirm '$CONFIRM' does not match chart '$UNIT'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Materialize kubeconfig
        env:
          DEPLOYER_KUBECONFIG: ${{ secrets.DEPLOYER_KUBECONFIG }}
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/kubeconfig"
          printf '%s' "$DEPLOYER_KUBECONFIG" > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Resolve target
        id: target
        env:
          UNIT: ${{ inputs.chart }}
        run: |
          file=".github/deploy-targets.json"
          entry="$(jq -e --arg u "$UNIT" '.[$u]' "$file")" || {
            echo "::error::No deploy target '$UNIT' in $file"
            exit 1
          }
          {
            echo "release=$(jq -r '.release' <<< "$entry")"
            echo "namespace=$(jq -r '.namespace' <<< "$entry")"
          } >> "$GITHUB_OUTPUT"

      - name: Uninstall
        env:
          RELEASE: ${{ steps.target.outputs.release }}
          NS: ${{ steps.target.outputs.namespace }}
        run: |
          set -euo pipefail
          if ! helm status "$RELEASE" --namespace "$NS" >/dev/null 2>&1; then
            echo "::warning::Release '$RELEASE' not found in namespace '$NS'; nothing to uninstall"
            exit 0
          fi
          echo "::group::helm uninstall $RELEASE --namespace $NS"
          helm uninstall "$RELEASE" --namespace "$NS" --wait --timeout 10m
          echo "::endgroup::"

      - name: What remains
        env:
          NS: ${{ steps.target.outputs.namespace }}
        run: |
          set -euo pipefail
          echo "Namespace, PVCs, CRDs, and Secrets are deliberately not removed."
          kubectl get all,pvc --namespace "$NS" || true
