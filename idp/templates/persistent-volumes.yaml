{{- if .Values.persistence.createPersistentVolumes }}
{{- $fullname := include "idp.fullname" . }}
{{- $labels := include "idp.labels" . }}
{{- range $name, $config := dict "pocket-id" .Values.persistence.pocketId "lldap" .Values.persistence.lldap }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ printf "%s-%s" $fullname $name | trunc 63 | trimSuffix "-" | quote }}
  labels:
    {{- $labels | nindent 4 }}
spec:
  capacity:
    storage: {{ $config.size | quote }}
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: {{ $.Values.persistence.reclaimPolicy }}
  storageClassName: {{ $.Values.persistence.storageClassName | quote }}
  hostPath:
    path: {{ printf "%s/%s" $.Values.persistence.hostPathBase $name | quote }}
    type: DirectoryOrCreate
{{- end }}
{{- end }}
