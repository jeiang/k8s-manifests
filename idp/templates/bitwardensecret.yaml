{{- if .Values.bitwardenSecrets.enabled }}
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: {{ include "idp.secretName" . | quote }}
  labels:
    {{- include "idp.labels" . | nindent 4 }}
spec:
  organizationId: {{ required "bitwardenSecrets.organizationId is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.organizationId | quote }}
  secretName: {{ include "idp.secretName" . | quote }}
  onlyMappedSecrets: true
  map:
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.lldapJwtSecret is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.lldapJwtSecret | quote }}
      secretKeyName: {{ .Values.secrets.keys.lldapJwtSecret | quote }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.lldapKeySeed is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.lldapKeySeed | quote }}
      secretKeyName: {{ .Values.secrets.keys.lldapKeySeed | quote }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.lldapAdminPassword is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.lldapAdminPassword | quote }}
      secretKeyName: {{ .Values.secrets.keys.lldapAdminPassword | quote }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.pocketIdEncryptionKey is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.pocketIdEncryptionKey | quote }}
      secretKeyName: {{ .Values.secrets.keys.pocketIdEncryptionKey | quote }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.pocketIdStaticApiKey is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.pocketIdStaticApiKey | quote }}
      secretKeyName: {{ .Values.secrets.keys.pocketIdStaticApiKey | quote }}
    {{- if .Values.pocketId.smtp.enabled }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.pocketIdSmtpPassword is required when bitwardenSecrets.enabled=true and pocketId.smtp.enabled=true" .Values.bitwardenSecrets.secretIds.pocketIdSmtpPassword | quote }}
      secretKeyName: {{ .Values.secrets.keys.pocketIdSmtpPassword | quote }}
    {{- end }}
  authToken:
    secretName: {{ required "bitwardenSecrets.authToken.secretName is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.authToken.secretName | quote }}
    secretKey: {{ required "bitwardenSecrets.authToken.secretKey is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.authToken.secretKey | quote }}
{{- end }}
