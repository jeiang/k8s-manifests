apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "idp.pocketIdName" . | quote }}
  labels:
    {{- include "idp.labels" . | nindent 4 }}
    app.kubernetes.io/component: pocket-id
spec:
  replicas: {{ .Values.pocketId.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "idp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pocket-id
  template:
    metadata:
      labels:
        {{- include "idp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pocket-id
    spec:
      containers:
        - name: pocket-id
          image: "{{ .Values.pocketId.image.repository }}:{{ .Values.pocketId.image.tag }}"
          imagePullPolicy: {{ .Values.pocketId.image.pullPolicy }}
          env:
            - name: APP_URL
              value: "https://{{ .Values.global.pocketIdHost }}"
            - name: TRUST_PROXY
              value: "true"
            - name: UI_CONFIG_DISABLED
              value: "true"
            - name: ANALYTICS_DISABLED
              value: "true"
            - name: DB_CONNECTION_STRING
              value: /app/data/pocket-id.db
            - name: ENCRYPTION_KEY_FILE
              value: /run/secrets/pocket-id-encryption-key
            - name: STATIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "idp.secretName" . | quote }}
                  key: {{ .Values.secrets.keys.pocketIdStaticApiKey | quote }}
            {{- if .Values.pocketId.smtp.enabled }}
            - name: SMTP_HOST
              value: {{ .Values.pocketId.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.pocketId.smtp.port | quote }}
            - name: SMTP_FROM
              value: {{ .Values.pocketId.smtp.from | quote }}
            - name: SMTP_USER
              value: {{ .Values.pocketId.smtp.user | quote }}
            - name: SMTP_PASSWORD_FILE
              value: /run/secrets/pocket-id-smtp-password
            - name: SMTP_TLS
              value: {{ .Values.pocketId.smtp.tls | quote }}
            - name: SMTP_SKIP_CERT_VERIFY
              value: {{ .Values.pocketId.smtp.skipCertVerify | quote }}
            {{- end }}
            - name: EMAIL_VERIFICATION_ENABLED
              value: {{ .Values.pocketId.email.verificationEnabled | quote }}
            - name: EMAIL_ONE_TIME_ACCESS_AS_ADMIN_ENABLED
              value: {{ .Values.pocketId.email.oneTimeAccessAsAdminEnabled | quote }}
            - name: EMAIL_LOGIN_NOTIFICATION_ENABLED
              value: {{ .Values.pocketId.email.loginNotificationEnabled | quote }}
            - name: EMAIL_API_KEY_EXPIRATION_ENABLED
              value: {{ .Values.pocketId.email.apiKeyExpirationEnabled | quote }}
            - name: EMAIL_ONE_TIME_ACCESS_AS_UNAUTHENTICATED_ENABLED
              value: {{ .Values.pocketId.email.oneTimeAccessAsUnauthenticatedEnabled | quote }}
            - name: ALLOW_USER_SIGNUPS
              value: {{ .Values.pocketId.signups.allowUserSignups | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.pocketId.port }}
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pocketId.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: secrets
              mountPath: /run/secrets/pocket-id-encryption-key
              subPath: pocket-id-encryption-key
              readOnly: true
            {{- if .Values.pocketId.smtp.enabled }}
            - name: secrets
              mountPath: /run/secrets/pocket-id-smtp-password
              subPath: pocket-id-smtp-password
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ printf "%s-pocket-id" (include "idp.fullname" .) | trunc 63 | trimSuffix "-" | quote }}
        - name: secrets
          secret:
            secretName: {{ include "idp.secretName" . | quote }}
            items:
              - key: {{ .Values.secrets.keys.pocketIdEncryptionKey | quote }}
                path: pocket-id-encryption-key
              {{- if .Values.pocketId.smtp.enabled }}
              - key: {{ .Values.secrets.keys.pocketIdSmtpPassword | quote }}
                path: pocket-id-smtp-password
              {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "idp.pocketIdName" . | quote }}
  labels:
    {{- include "idp.labels" . | nindent 4 }}
    app.kubernetes.io/component: pocket-id
spec:
  type: {{ .Values.service.pocketId.type }}
  selector:
    {{- include "idp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pocket-id
  ports:
    - name: http
      port: {{ .Values.service.pocketId.port }}
      targetPort: http
      protocol: TCP
