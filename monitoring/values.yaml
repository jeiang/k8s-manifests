global:
  cluster:
    dnsDomain: cluster.local.

# k3s runs kube-scheduler, kube-controller-manager, and etcd embedded in the
# k3s binary on loopback-only ports, not as separate pods with routable
# metrics endpoints. The chart's default Services/VMServiceScrapes for these
# components have no matching endpoints on k3s, and the matching alert rule
# groups fire permanently (KubeSchedulerDown, KubeControllerManagerDown,
# ScrapePoolHasNoTargets, RecordingRulesNoData) rather than reflecting a real
# problem. Disabled rather than fixed via k3s server flags + static
# endpoints, since this is a single-node control plane where that visibility
# isn't worth the added node-level configuration to maintain.
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false

defaultRules:
  groups:
    kubernetes-system-scheduler:
      enabled: false
    kubernetes-system-controller-manager:
      enabled: false
    etcd:
      enabled: false
    kube-scheduler.rules:
      enabled: false

vmsingle:
  enabled: true
  spec:
    retentionPeriod: "1"
    replicaCount: 1
    resources:
      requests:
        cpu: 150m
        memory: 500Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storage:
      accessModes:
        - ReadWriteOnce
      storageClassName: hcloud-volumes
      resources:
        requests:
          storage: 20Gi
  ingress:
    enabled: false

vlsingle:
  enabled: true
  spec:
    retentionPeriod: "1"
    replicaCount: 1
    resources:
      requests:
        cpu: 75m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      accessModes:
        - ReadWriteOnce
      storageClassName: hcloud-volumes
      resources:
        requests:
          storage: 20Gi
  ingress:
    enabled: false

vlagent:
  enabled: true
  spec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 384Mi
    k8sCollector:
      enabled: true
  ingress:
    enabled: false

vmagent:
  spec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 384Mi

vmalert:
  spec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 384Mi

alertmanager:
  spec:
    resources:
      requests:
        cpu: 30m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
    secrets:
      - alertmanager-discord
  config:
    route:
      receiver: discord-notifications
      group_by: ["alertgroup", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: discord-notifications
        discord_configs:
          - webhook_url_file: /etc/vm/secrets/alertmanager-discord/webhookUrl

internal:
  vmauth:
    spec:
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 200m
          memory: 300Mi

grafana:
  enabled: true
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    storageClassName: hcloud-volumes
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  plugins:
    - victoriametrics-metrics-datasource
    - victoriametrics-logs-datasource
  envFromSecret: grafana-oauth
  grafana.ini:
    server:
      domain: grafana.jeiang.dev
      root_url: https://grafana.jeiang.dev
    auth:
      disable_login_form: true
      oauth_auto_login: true
    auth.generic_oauth:
      enabled: true
      name: Pocket ID
      allow_sign_up: true
      client_id: a70e6d0d-360c-415f-b154-85ec7a6bc352
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      auth_url: https://auth.jeiang.dev/authorize
      token_url: https://auth.jeiang.dev/api/oidc/token
      api_url: https://auth.jeiang.dev/api/oidc/userinfo
      login_attribute_path: preferred_username
      name_attribute_path: name
      email_attribute_path: email
      role_attribute_path: contains(groups[*], 'monitoring_admin') && 'Admin' || contains(groups[*], 'monitoring_editor') && 'Editor' || contains(groups[*], 'monitoring_reader') && 'Viewer'
      role_attribute_strict: true
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.jeiang.dev
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.jeiang.dev
