replicaCount: 1

image:
  repository: ghcr.io/jeiang/bill-splitter
  tag: ba481839c2eb24aa1079e902827121dc81d2936f
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

probes:
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 2
    periodSeconds: 10
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 20

ingress:
  enabled: true
  className: traefik

  hosts:
    - bill-split.jeiang.dev

  tls:
    enabled: true
    secretName: bill-splitter-tls

  redirectToHttps: true

certManager:
  enabled: true
  clusterIssuer:
    create: false
    name: letsencrypt-prod
    email: aidan@aidanpinard.co
    server: https://acme-v02.api.letsencrypt.org/directory
