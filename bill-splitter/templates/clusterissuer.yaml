{{- if and .Values.certManager.enabled .Values.certManager.clusterIssuer.create }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name | quote }}
spec:
  acme:
    email: {{ .Values.certManager.clusterIssuer.email | quote }}
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.certManager.clusterIssuer.name | quote }}
    solvers:
      - http01:
          ingress:
            ingressClassName: {{ .Values.ingress.className | quote }}
{{- end }}
