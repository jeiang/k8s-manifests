{{- if .Values.bitwardenSecrets.enabled }}
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: {{ include "netbird.secretName" . | quote }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
spec:
  organizationId: {{ required "bitwardenSecrets.organizationId is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.organizationId | quote }}
  secretName: {{ include "netbird.secretName" . | quote }}
  onlyMappedSecrets: true
  map:
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.storeEncryptionKey is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.storeEncryptionKey | quote }}
      secretKeyName: {{ .Values.secrets.keys.storeEncryptionKey | quote }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.relayAuthSecret is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.relayAuthSecret | quote }}
      secretKeyName: {{ .Values.secrets.keys.relayAuthSecret | quote }}
    - bwSecretId: {{ required "bitwardenSecrets.secretIds.idpSessionCookieEncryptionKey is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.secretIds.idpSessionCookieEncryptionKey | quote }}
      secretKeyName: {{ .Values.secrets.keys.idpSessionCookieEncryptionKey | quote }}
  authToken:
    secretName: {{ required "bitwardenSecrets.authToken.secretName is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.authToken.secretName | quote }}
    secretKey: {{ required "bitwardenSecrets.authToken.secretKey is required when bitwardenSecrets.enabled=true" .Values.bitwardenSecrets.authToken.secretKey | quote }}
{{- end }}
