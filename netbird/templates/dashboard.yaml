apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.dashboardName" . | quote }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbird.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "netbird.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          env:
            - name: NETBIRD_MGMT_API_ENDPOINT
              value: {{ .Values.global.publicUrl | quote }}
            - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
              value: {{ .Values.global.publicUrl | quote }}
            - name: AUTH_AUDIENCE
              value: netbird-dashboard
            - name: AUTH_CLIENT_ID
              value: netbird-dashboard
            - name: AUTH_CLIENT_SECRET
              value: ""
            - name: AUTH_AUTHORITY
              value: {{ printf "%s/oauth2" .Values.global.publicUrl | quote }}
            - name: USE_AUTH0
              value: "false"
            - name: AUTH_SUPPORTED_SCOPES
              value: "openid profile email groups"
            - name: AUTH_REDIRECT_URI
              value: /nb-auth
            - name: AUTH_SILENT_REDIRECT_URI
              value: /nb-silent-auth
            - name: NGINX_SSL_PORT
              value: "443"
            - name: LETSENCRYPT_DOMAIN
              value: none
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.dashboardName" . | quote }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "netbird.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: http
