global:
  host: netbird.jeiang.dev
  publicUrl: https://netbird.jeiang.dev

secrets:
  existingSecret: netbird-secrets
  keys:
    storeEncryptionKey: store-encryption-key
    relayAuthSecret: relay-auth-secret
    idpSessionCookieEncryptionKey: idp-session-cookie-encryption-key

bitwardenSecrets:
  enabled: true
  organizationId: af918704-c223-4f10-a245-b4640144f2d9
  authToken:
    secretName: bw-auth-token
    secretKey: token
  secretIds:
    storeEncryptionKey: "9eb3d9c5-58ed-4a6a-afa4-b465002871e7"
    relayAuthSecret: "263bee8d-be56-4d26-bec4-b4650028727c"
    idpSessionCookieEncryptionKey: "0bddc1f8-cb8c-4f2f-b1c1-b465002872ff"

server:
  replicaCount: 1
  image:
    repository: netbirdio/netbird-server
    tag: 0.72.1
    pullPolicy: IfNotPresent
  port: 80
  metricsPort: 9090
  healthPort: 9000
  logLevel: info
  dataDir: /var/lib/netbird
  dnsDomain: jeiang.vpn
  credentialsTTL: 24h
  renderConfig:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 768Mi

dashboard:
  replicaCount: 1
  image:
    repository: netbirdio/dashboard
    tag: v2.39.0
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

relay:
  replicaCount: 2
  image:
    repository: netbirdio/relay
    tag: 0.72.1
    pullPolicy: IfNotPresent
  port: 8080
  stunHost: stun.netbird.jeiang.dev
  stunPort: 3478
  exposedAddress: rels://netbird.jeiang.dev:443
  enableStun: true
  hostNetwork:
    enabled: true
  logLevel: info
  nodeSelector:
    netbird.io/stun: "true"
  antiAffinity:
    enabled: true
  affinity: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

service:
  type: ClusterIP
  stun:
    type: ClusterIP
    annotations: {}
    externalTrafficPolicy: Cluster

ingress:
  enabled: true
  className: traefik
  entryPoint: websecure
  tls:
    enabled: true
    secretName: netbird-tls
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod

persistence:
  enabled: true
  size: 10Gi
  storageClassName: hcloud-volumes

nodeSelector: {}
tolerations: []
affinity: {}
