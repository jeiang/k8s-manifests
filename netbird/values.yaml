global:
  host: netbird.jeiang.dev
  publicUrl: https://netbird.jeiang.dev

secrets:
  existingSecret: netbird-secrets
  keys:
    storeEncryptionKey: store-encryption-key
    relayAuthSecret: relay-auth-secret
    idpSessionCookieEncryptionKey: idp-session-cookie-encryption-key
    proxyToken: proxy-token
    crowdsecBouncerKey: crowdsec-bouncer-key

bitwardenSecrets:
  enabled: true
  organizationId: af918704-c223-4f10-a245-b4640144f2d9
  authToken:
    secretName: bw-auth-token
    secretKey: token
  secretIds:
    storeEncryptionKey: "9eb3d9c5-58ed-4a6a-afa4-b465002871e7"
    relayAuthSecret: "263bee8d-be56-4d26-bec4-b4650028727c"
    idpSessionCookieEncryptionKey: "0bddc1f8-cb8c-4f2f-b1c1-b465002872ff"
    proxyToken: "dacb7eb2-4cdf-45de-9541-b47300025e5d"
    crowdsecBouncerKey: "0ed93d41-e38e-44de-9f87-b47a00f76710"

server:
  replicaCount: 1
  image:
    repository: netbirdio/netbird-server
    tag: 0.73.2
    pullPolicy: IfNotPresent
  port: 80
  metricsPort: 9090
  healthPort: 9000
  logLevel: info
  dataDir: /var/lib/netbird
  dnsDomain: jeiang.vpn
  credentialsTTL: 24h
  renderConfig:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 768Mi

dashboard:
  replicaCount: 1
  image:
    repository: netbirdio/dashboard
    tag: v2.80.0
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

relay:
  replicaCount: 2
  image:
    repository: netbirdio/relay
    tag: 0.73.2
    pullPolicy: IfNotPresent
  port: 8080
  stunHost: stun.netbird.jeiang.dev
  stunPort: 3478
  exposedAddress: rels://netbird.jeiang.dev:443
  enableStun: true
  hostNetwork:
    enabled: true
  logLevel: info
  nodeSelector:
    netbird.io/stun: "true"
  antiAffinity:
    enabled: true
  affinity: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

proxy:
  enabled: true
  replicaCount: 1
  image:
    repository: netbirdio/reverse-proxy
    tag: 0.73.2
    pullPolicy: IfNotPresent
  domain: proxy.jeiang.dev
  wildcardDomain: "*.proxy.jeiang.dev"
  wildcardDomainRegexp: '^.+\.proxy\.jeiang\.dev$'
  port: 8443
  managementAddress: ""
  allowInsecure: true
  acmeCertificates: true
  acmeChallengeType: tls-alpn-01
  certificateDirectory: /certs
  proxyProtocol:
    enabled: true
    version: 2
    trustedProxies: 10.42.0.0/16
  crowdsec:
    enabled: true
    apiUrl: http://crowdsec-service.crowdsec.svc.cluster.local:8080
    apiKeySecretKey: crowdsec-bouncer-key
  uid: "1000"
  gid: "1000"
  logLevel: info
  certsInit:
    image:
      repository: busybox
      tag: "1.36"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: hcloud-volumes
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

service:
  type: ClusterIP
  stun:
    type: ClusterIP
    annotations: {}
    externalTrafficPolicy: Cluster

ingress:
  enabled: true
  className: traefik
  entryPoint: websecure
  tls:
    enabled: true
    secretName: netbird-tls
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod

persistence:
  enabled: true
  size: 10Gi
  storageClassName: hcloud-volumes

nodeSelector: {}
tolerations: []
affinity: {}
