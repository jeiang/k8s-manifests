{{- if ne (int .Values.replicaCount) 1 }}
{{- fail "replicaCount must remain 1 while using the SQLite database" }}
{{- end }}
{{- if ne .Values.strategy.type "Recreate" }}
{{- fail "strategy.type must remain Recreate while using an hcloud-volumes RWO claim" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "attic.fullname" . }}
  labels:
    {{- include "attic.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "attic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "attic.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: attic
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/atticd
          args:
            - -f
            - /etc/attic/server.toml
            - --mode
            - monolithic
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "attic.secretName" . | quote }}
                  key: {{ .Values.secrets.keys.s3AccessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "attic.secretName" . | quote }}
                  key: {{ .Values.secrets.keys.s3SecretAccessKey | quote }}
            - name: ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: {{ include "attic.secretName" . | quote }}
                  key: {{ .Values.secrets.keys.tokenRs256SecretBase64 | quote }}
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/attic/server.toml
              subPath: server.toml
              readOnly: true
            - name: data
              mountPath: {{ .Values.persistence.mountPath | quote }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "attic.fullname" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "attic.claimName" . | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
