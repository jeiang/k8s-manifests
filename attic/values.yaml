replicaCount: 1

image:
  repository: ghcr.io/jeiang/attic
  tag: 7e0a356cf10ed1a6b4bb5b565faed8be35d5607e
  pullPolicy: IfNotPresent

strategy:
  type: RollingUpdate

server:
  host: attic.jeiang.dev
  apiEndpoint: https://attic.jeiang.dev/
  port: 8080
  logFilter: info,attic_server=debug
  maxConcurrentUploads: 2
  # The PostgreSQL connection URL contains credentials, so it lives only in
  # the Bitwarden-synced Secret and reaches the server through the
  # ATTIC_SERVER_DATABASE_URL environment variable, never this file.
  database:
    heartbeat: true
  # Must stay false: chunk-level dedup negotiation for uploads is disabled by
  # the server whenever proof of possession is required. The tradeoff is that
  # knowing a NAR hash grants access to that NAR in the global dedup store.
  requireProofOfPossession: false
  garbageCollection:
    interval: 12 hours
    defaultRetentionPeriod: 0 seconds
  storage:
    type: s3
    region: ca-montreal
    bucket: attic
    endpoint: https://s3.ca-montreal.megas4.com
  # Sized for per-object Mega S4 latency (~0.2-0.35s per chunk PUT): 256KiB
  # average keeps large NAR uploads inside client/LB connection limits.
  # Changed 2026-07-19 while the store was empty, so no dedup reuse was lost.
  chunking:
    narSizeThreshold: 65536
    minSize: 65536
    avgSize: 262144
    maxSize: 1048576
  compression:
    type: zstd
    level: 8

oidc:
  githubActions:
    enabled: true
    name: github-actions
    issuer: https://token.actions.githubusercontent.com
    audience: https://attic.jeiang.dev/
    jwksUrl: https://token.actions.githubusercontent.com/.well-known/jwks
    tokenValidity: 12 hours
    # Trust the immutable owner ID, not the mutable account name. Protected
    # refs in any repository owned by this account may use the default cache.
    rules:
      - claims:
          repository_owner_id: "31970261"
          ref_protected: "true"
        caches:
          default:
            pull: true
            push: true
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false
      # Allow every workflow context in repositories owned by jeiang to consume
      # the cache. Protected refs also match the rule above and gain push access.
      - claims:
          repository_owner_id: "31970261"
        caches:
          default:
            pull: true
            push: false
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false
  pocketId:
    enabled: true
    name: pocketid
    displayName: Pocket ID
    issuer: https://auth.jeiang.dev
    audience: "0304a563-8b46-4731-9eb0-224e8f0d1c7b"
    jwksUrl: https://auth.jeiang.dev/.well-known/jwks.json
    authorizationEndpoint: https://auth.jeiang.dev/authorize
    tokenEndpoint: https://auth.jeiang.dev/api/oidc/token
    scopes:
      - openid
      - profile
      - groups
    tokenValidity: 12 hours
    rules:
      - claims:
          attic_role: admin
        caches:
          "*":
            pull: true
            push: true
            delete: true
            create: true
            configure: true
            configureRetention: true
            destroy: true
      - claims:
          attic_role: writer
        caches:
          "*":
            pull: true
            push: true
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false
      - claims:
          attic_role: reader
        caches:
          "*":
            pull: true
            push: false
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false

secrets:
  existingSecret: attic-secrets
  keys:
    s3AccessKeyId: AWS_ACCESS_KEY_ID
    s3SecretAccessKey: AWS_SECRET_ACCESS_KEY
    tokenRs256SecretBase64: ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64
    databaseUrl: ATTIC_SERVER_DATABASE_URL

# Enable after creating these four Secrets Manager entries. Secret IDs are
# identifiers, not secret values, but stay environment-specific.
bitwardenSecrets:
  enabled: true
  organizationId: "af918704-c223-4f10-a245-b4640144f2d9"
  authToken:
    secretName: bw-auth-token
    secretKey: token
  secretIds:
    s3AccessKeyId: "4665f391-c3ec-45ef-8aab-b48500717b56"
    s3SecretAccessKey: "e9ff9778-0c28-42fd-a318-b48500719679"
    tokenRs256SecretBase64: "296c5301-9dda-4ab7-a472-b4850071559e"
    databaseUrl: "a783a91e-c57d-4dc7-a7f5-b48b00f4e2ad"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  annotations: {}
  host: attic.jeiang.dev
  tls:
    enabled: true
    secretName: attic-tls
    clusterIssuer: letsencrypt-prod
  # Leave empty by default: AppSec body inspection can reject large NAR uploads.
  crowdsecMiddleware: ""

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

probes:
  readiness:
    tcpSocket:
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  liveness:
    tcpSocket:
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3

nodeSelector:
  workload.jeiang.dev/attic: "true"
tolerations: []
affinity: {}
