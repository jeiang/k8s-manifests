replicaCount: 1

image:
  repository: ghcr.io/jeiang/attic
  tag: 28c0295d250ac438946cea5471b70cea84c9aab0
  pullPolicy: IfNotPresent

strategy:
  type: Recreate

server:
  host: attic.jeiang.dev
  apiEndpoint: https://attic.jeiang.dev/
  port: 8080
  databaseUrl: sqlite:///data/attic.db?mode=rwc
  requireProofOfPossession: true
  garbageCollection:
    interval: 12 hours
    defaultRetentionPeriod: 0 seconds
  storage:
    type: s3
    region: ca-montreal
    bucket: attic
    endpoint: https://s3.ca-montreal.megas4.com
  chunking:
    narSizeThreshold: 65536
    minSize: 16384
    avgSize: 65536
    maxSize: 262144
  compression:
    type: zstd
    level: 8

oidc:
  githubActions:
    enabled: true
    name: github-actions
    issuer: https://token.actions.githubusercontent.com
    audience: https://attic.jeiang.dev/
    jwksUrl: https://token.actions.githubusercontent.com/.well-known/jwks
    tokenValidity: 12 hours
    # GitHub currently reports jeiang/attic main as protected=false, so this
    # rule intentionally matches no workflow until branch protection or a
    # ruleset protects main. Do not weaken refProtected to "false".
    rules:
      - claims:
          repositoryId: "1297481441"
          ref: refs/heads/main
          refProtected: "true"
        caches:
          attic-ci:
            pull: true
            push: true
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false
  pocketId:
    enabled: true
    name: pocketid
    displayName: Pocket ID
    issuer: https://auth.jeiang.dev
    audience: "0304a563-8b46-4731-9eb0-224e8f0d1c7b"
    jwksUrl: https://auth.jeiang.dev/.well-known/jwks.json
    authorizationEndpoint: https://auth.jeiang.dev/authorize
    tokenEndpoint: https://auth.jeiang.dev/api/oidc/token
    scopes:
      - openid
      - profile
      - groups
    tokenValidity: 12 hours
    rules:
      - claims:
          attic_role: admin
        caches:
          "*":
            pull: true
            push: true
            delete: true
            create: true
            configure: true
            configureRetention: true
            destroy: true
      - claims:
          attic_role: writer
        caches:
          "*":
            pull: true
            push: true
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false
      - claims:
          attic_role: reader
        caches:
          "*":
            pull: true
            push: false
            delete: false
            create: false
            configure: false
            configureRetention: false
            destroy: false

secrets:
  existingSecret: attic-secrets
  keys:
    s3AccessKeyId: AWS_ACCESS_KEY_ID
    s3SecretAccessKey: AWS_SECRET_ACCESS_KEY
    tokenRs256SecretBase64: ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64

# Enable after creating these three Secrets Manager entries. Secret IDs are
# identifiers, not secret values, but stay environment-specific.
bitwardenSecrets:
  enabled: true
  organizationId: "af918704-c223-4f10-a245-b4640144f2d9"
  authToken:
    secretName: bw-auth-token
    secretKey: token
  secretIds:
    s3AccessKeyId: "4665f391-c3ec-45ef-8aab-b48500717b56"
    s3SecretAccessKey: "e9ff9778-0c28-42fd-a318-b48500719679"
    tokenRs256SecretBase64: "296c5301-9dda-4ab7-a472-b4850071559e"

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: hcloud-volumes
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  mountPath: /data
  annotations:
    helm.sh/resource-policy: keep

ingress:
  enabled: true
  className: traefik
  annotations: {}
  host: attic.jeiang.dev
  tls:
    enabled: true
    secretName: attic-tls
    clusterIssuer: letsencrypt-prod
  # Leave empty by default: AppSec body inspection can reject large NAR uploads.
  crowdsecMiddleware: ""

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

probes:
  readiness:
    tcpSocket:
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  liveness:
    tcpSocket:
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3

nodeSelector:
  workload.jeiang.dev/attic: "true"
tolerations: []
affinity: {}
