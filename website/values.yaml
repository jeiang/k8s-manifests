replicaCount: 1

image:
  repository: ghcr.io/jeiang/website
  tag: sha-6ac94e3
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID

probes:
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 2
    periodSeconds: 10
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 20

ingress:
  enabled: true
  className: traefik

  hosts:
    - jeiang.dev
    - aidanpinard.co
    - pinard.co.tt

  tls:
    enabled: true
    secretName: website-tls

  redirectToHttps: true

  # CrowdSec AppSec (WAF) Traefik middleware. The global websecure-entrypoint
  # bouncer runs IP-only (stream mode); L7 body inspection is opt-in per-route.
  # Set to "" to disable AppSec for this app (it keeps IP blocking either way).
  wafMiddleware: crowdsec-appsec@file

certManager:
  enabled: true
  clusterIssuer:
    create: false
    name: letsencrypt-prod
    email: aidan@aidanpinard.co
    server: https://acme-v02.api.letsencrypt.org/directory
