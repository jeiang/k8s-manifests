# Values for community-charts/actualbudget.

replicaCount: 1

fullnameOverride: actual-budget

strategy:
  type: Recreate
  rollingUpdate: null

image:
  repository: actualbudget/actual-server
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 5006
  name: http
  annotations: {}

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # CrowdSec AppSec (WAF), opt-in per-route; global entrypoint bouncer is IP-only.
    traefik.ingress.kubernetes.io/router.middlewares: crowdsec-appsec@file
  hosts:
    - host: budget.jeiang.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: actual-budget-tls
      hosts:
        - budget.jeiang.dev

persistence:
  enabled: true
  annotations: {}
  storageClass: hcloud-volumes
  subPath: ""
  volumeMode: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

login:
  method: password
  skipSSLVerification: false
  allowedLoginMethods:
    - password

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

initContainers:
  - name: prepare-data-directories
    image: busybox:1.36
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -ec
      - mkdir -p /data/server-files /data/user-files
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
    volumeMounts:
      - name: data
        mountPath: /data
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  privileged: false
  runAsUser: 1000
  runAsGroup: 1000

extraEnvVars: {}

nodeSelector: {}
tolerations: []
affinity: {}
